services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: online-chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build: ./server
    restart: always
    env_file:
      - ./server/.env.docker
    ports:
      - "5000:5000"
    depends_on:
      - db

  client:
    build: ./client
    restart: always
    ports:
      - "7070:80"
    depends_on:
      - server

volumes:
  pgdata:
