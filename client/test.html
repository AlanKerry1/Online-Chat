<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack-клон</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>

    <div class="container">

        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Мой Slack</h1>
            </div>
            <div class="channels">
                <h3>Каналы  <button class="add-button" id="add-channel-button">+</button></h3>
                <ul id="channel-list">
                    <li>#general</li>
                    <li>#random</li>
                    <li>#проекты</li>
                </ul>
                <div id="add-channel-form" style="display:none;">
                    <input type="text" id="new-channel-name" class="add-input" placeholder="Название канала">
                    <button class="add-button" id="create-channel-button">Создать</button>
                </div>
            </div>
            <div class="direct-messages">
                <h3>Личные сообщения <button class="add-button" id="add-dm-button">+</button></h3>
                <ul id="dm-list">
                    <li>Пользователь 1</li>
                    <li>Пользователь 2</li>
                    <li>Пользователь 3</li>
                </ul>
                <div id="add-dm-form" style="display:none;">
                    <input type="text" id="new-dm-name" class="add-input" placeholder="Имя пользователя">
                    <button class="add-button" id="create-dm-button">Создать</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-header">
                <h2 id="current-chat-title">#general</h2>
            </div>
            <div class="chat-window" id="chat-window">
                <!-- Сообщения будут добавляться сюда динамически -->
                <div class="message">
                    <span class="user">Пользователь 1:</span>
                    <span class="text">Привет всем!</span>
                </div>
                <div class="message">
                    <span class="user">Пользователь 2:</span>
                    <span class="text">Привет! Как дела?</span>
                </div>
            </div>
            <div class="message-input">
                <input type="text" id="message-text" placeholder="Напишите сообщение...">
                <button id="send-button">Отправить</button>
            </div>
        </main>

    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const messageText = document.getElementById('message-text');
        const sendButton = document.getElementById('send-button');
        const channelList = document.getElementById('channel-list');
        const dmList = document.getElementById('dm-list');
        const addChannelButton = document.getElementById('add-channel-button');
        const addDMButton = document.getElementById('add-dm-button');
        const addChannelForm = document.getElementById('add-channel-form');
        const addDMForm = document.getElementById('add-dm-form');
        const newChannelName = document.getElementById('new-channel-name');
        const newDMName = document.getElementById('new-dm-name');
        const createChannelButton = document.getElementById('create-channel-button');
        const createDMButton = document.getElementById('create-dm-button');
        const currentChatTitle = document.getElementById('current-chat-title');

        // Функция для отправки сообщения
        sendButton.addEventListener('click', function() {
            const text = messageText.value;
            if (text.trim() !== "") {
                const newMessage = document.createElement('div');
                newMessage.classList.add('message');
                newMessage.innerHTML = `<span class="user">Вы:</span> <span class="text">${text}</span>`;
                chatWindow.appendChild(newMessage);
                messageText.value = ''; // Очистить поле ввода
                chatWindow.scrollTop = chatWindow.scrollHeight; // Прокрутить вниз
            }
        });

        // Докрутка до последнего сообщения при загрузке
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Функция для добавления канала или личного сообщения в список
        function addItemToList(listElement, itemName, itemType) {
            const newItem = document.createElement('li');
            newItem.textContent = itemName;
            newItem.addEventListener('click', () => {
                currentChatTitle.textContent = itemType === 'channel' ? '#' + itemName : itemName;
                //  Здесь можно добавить логику для загрузки сообщений для выбранного канала/сообщения
                chatWindow.innerHTML = ''; // Очистить окно чата (заглушка)
            });
            listElement.appendChild(newItem);
        }


        // Обработчики для добавления каналов
        addChannelButton.addEventListener('click', () => {
            addChannelForm.style.display = "block";
        });

        createChannelButton.addEventListener('click', () => {
            const channelName = newChannelName.value.trim();
            if (channelName !== "") {
                addItemToList(channelList, channelName, 'channel');
                newChannelName.value = "";
                addChannelForm.style.display = "none";
            }
        });

        // Обработчики для добавления личных сообщений
        addDMButton.addEventListener('click', () => {
            addDMForm.style.display = "block";
});

        createDMButton.addEventListener('click', () => {
            const dmName = newDMName.value.trim();
            if (dmName !== "") {
                addItemToList(dmList, dmName, 'dm');
                newDMName.value = "";
                addDMForm.style.display = "none";
            }
        });

        // Инициализация обработчиков кликов для существующих каналов и личных сообщений
        document.querySelectorAll('#channel-list li').forEach(item => {
            item.addEventListener('click', () => {
                currentChatTitle.textContent = '#' + item.textContent;
                chatWindow.innerHTML = '';  // Очистить окно чата (заглушка)
            });
        });

        document.querySelectorAll('#dm-list li').forEach(item => {
             item.addEventListener('click', () => {
                currentChatTitle.textContent = item.textContent;
                chatWindow.innerHTML = '';  // Очистить окно чата (заглушка)
            });
        });
    </script>
</body>
</html>
